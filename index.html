  <title>Donkey Kong Run</title>
  <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  html,body {
    width:100%;
    height:100%;
    background: black;
    overflow:hidden;
  }
  body{
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: min(100vw, calc(100vh*(1024/576)));
    height: min(100vh, calc(100vw*(576/1024)));
    display: block;
  }
  </style>
</head>
